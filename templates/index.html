<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puoppo 🕊️ 世論分析アプリ</title>
    <style>
        /* 🌿 全体のデザイン設定（白背景と自然な緑・花の色調） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcfdfa; /* 優しい白 */
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c5e3b; /* 深い緑 */
            margin-bottom: 5px;
        }

        .subtitle {
            color: #88a070; /* 葉っぱの色 */
            margin-bottom: 30px;
        }

        /* 🔍 検索フォームのスタイル */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #c2d6b4;
            border-radius: 25px;
            outline: none;
            box-sizing: border-box;
        }

        .search-button {
            position: absolute;
            right: 5px;
            top: 5px;
            padding: 7px 20px;
            background-color: #e8a7b6; /* 桜色・お花の色 */
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* ⚠️ 注意事項の赤字表示 */
        .warning-text {
            color: #d9534f;
            font-size: 13px;
            margin-top: 5px;
            text-align: center;
        }

        /* ⏳ ローディング画面の設定（初期状態は隠す） */
        #loading-screen {
            display: none;
            text-align: center;
            margin-top: 40px;
        }

        /* 🕊️ 飛び立つ鳩のアニメーション設定 */
        .dove {
            font-size: 40px;
            display: inline-block;
            transition: all 1.5s ease-in-out;
        }

        /* ボタンが押されたときにJavaScriptで付与するクラス */
        .dove.fly-away {
            transform: translate(300px, -200px) scale(1.5) rotate(15deg);
            opacity: 0;
        }

        /* 🔄 砂時計の回転アニメーション */
        .hourglass {
            font-size: 30px;
            display: inline-block;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Puoppo 🕊️</h1>
    <div class="subtitle">AI世論・不満トレンド分析システム</div>

    <!-- 検索フォーム -->
    <div class="search-container">
        <!-- 💡 action と method を追加して、Pythonの /search にデータを送るようにします -->
        <form id="search-form" action="/search" method="POST" onsubmit="startAnimation(event)">
            <!-- 💡 name="keyword" を追加して、入力された文字に名前をつけます -->
            <input type="text" name="keyword" class="search-input" placeholder="何か知りたい情報はありますか？" required>
            <button type="submit" class="search-button">🔍 調査</button>
        </form>
        <div class="warning-text">※信頼性の高いRSSデータのみを抽出して分析します。</div>
    </div>

    <!-- 🕊️ 初期状態の鳩とお花 -->
    <div id="dove-stage">
        <span id="pigeon" class="dove">🕊️🌸</span>
    </div>

    <!-- ⏳ 採用されたローディング画面（初期状態は非表示） -->
    <div id="loading-screen">
        <div class="hourglass">⏳</div>
        <p><strong>調査中...</strong></p>
        <p>花をくわえた鳩がニュースを集めています。約10秒ほどお待ちください。</p>
    </div>

    <script>
        // ボタンが押された時のアニメーション制御
        function startAnimation(event) {
            // 💡 以下の行の先頭に「//」をつけて、画面遷移を止めないように修正します！
            //event.preventDefault(); // テスト用に通常の画面遷移を一時的に止めます
            
            const pigeon = document.getElementById('pigeon');
            const loadingScreen = document.getElementById('loading-screen');

            // 1. 鳩がバサバサと右上へ飛び立つクラスを適用
            pigeon.classList.add('fly-away');

            // 2. 少し遅れてローディング画面（調査中...）を表示
            setTimeout(() => {
                loadingScreen.style.display = 'block';
            }, 500);
        }
    </script>

    <!-- 📋 検索履歴の一覧表示エリア -->
    <div style="margin-top: 40px; width: 100%; max-width: 500px;">
        <h3>これまでの検索履歴</h3>
        <ul style="list-style-type: none; padding: 0;">
            <!-- Pythonから渡された履歴データをループ処理で1件ずつ表示します -->
            {% for row in history %}
                <li style="background-color: #f0f4ee; padding: 10px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center;">
                    <span>🔍 {{ row[1] }}</span>
                    
                    <form action="/delete" method="POST" style="margin: 0;">
                        <input type="hidden" name="id" value="{{ row[0] }}">
                        <button type="submit" style="background: none; border: none; color: #d9534f; cursor: pointer; font-size: 14px; font-family: inherit; padding: 0;">削除</button>
                    </form>
                </li>

            {% endfor %}
        </ul>
    </div>

</body>
</html>
